body:
  text: 後學照瑩集自愍萬劫輪迴困愛河皆因貪染妄情多今番不早求離脫復恐臨終喚奈何皮毛胎骨脫如山回首迷時淚暗此世不聞除苦法安知發願出塵寰每動嗔心如獸羣只因人我太評分從今漸冷紅爐火全賴彌陀功德熏明知富貴等浮漚懊悔當年抵死求破衲殘羮今已足且無歡喜且無憂自慶年來念佛恨盲癡赤子啼親苦未知何幸要宗垂濟畢生信受憶明師自恨從前沒善根錯將妄想作讐冤於今幸遇徑中徑煩惱波濤一任掀叨蒙垂濟德無窮解我糾纏下劣躬信願行功相藉力帆張樂國疾如風欲見慈親不顧身晨昏禮念𢬵艱辛但期早得家鄉信樂國歸時屈臂伸偶成人間萬物盡難留識者快從徑路修六字全提無間斷定歸補處永無尤瞬息之間死夢成那堪放逸逐人情年來徧訪橫超法未獲持名指訣精訪求已至山陰間知識親提豈費閑只要持名如喚母不須參究透三關早識持名法最須深慚曩事惑岐途從今日把彌陀數功德無邊盡可圖生死漂沉不計年祇緣溺愛惹情纏於今幸獲持名法唯願早登極樂舡莫愁罪業不能除信願堅深定可祛念佛橫超登寶所何須門外覓三車六賊朝朝起亂波家珍無盡暗消磨誓將名號真誠念魔侶應能奉佛陀濁智波翻不易清多因累劫縱根情欲期當下塵緣了唯有殷勤誦佛名口喜招愆屢費呵祇由佛號未持多從今記數使無間業海定然息沸波幸因宿世種微根今日方逢勝異門但得樂慈父引不勞彈指便還元次妙能法師淨土偶成原韻二十首奇哉獨出易行門六字全收利鈍根上聖由斯登寶所凡蒙從此復心原傷心久在閻浮中內外魔纏令性庸何幸世尊垂救濟標西使我早離東西方教主德何窮具縛容歸七寶宮曠劫修行方有此勝緣誰比樂中此西實有寶華池歸去不勞彈指時好把洪名專切念彌陀來接必前知西方本是實中權捨彼更無奧妙傳可愍肉團內求者臨終無主恨茫然西方妙有即真空解此方知有異功六剎同遵如是事故令大地盡歸崇每想淨無海山深慚多劫戀塵寰願從此世超生去日日遊行寶樹間一句洪名多善根恒沙諸佛共垂恩眾生縱具泥犂罪十念猶能感聖援持名妙法本無非故得圓收上上機了悟不憑參究力別求勝異甚稀稀我心垢重實愚夫只解持名拜佛圖賴有彌陀慈願攝臨終定往覺王都多生顛倒攬羣陰六道輪迴被苦侵今幸持名橫截法西方寶所任登臨三乘聖道總迂徊全仗多生熏習來獨有彌陀深願力但憑一念託蓮胎凡夫莫慮不能生但恐狐疑彼佛名若得專持如憶母臨終定感佛親迎堪悲往日多迷誤背却康衢趨險步誰識真心在目前彌陀一句體全露莫疑罪業累層坡不得死心誦佛陀試比蓮池下品者造諸惡業是誰多觀門雖勝費神思心劣凡夫豈易知何似洪名六箇字專稱定得到蓮池黑牛欲得早調純必仗當人大願輪朝定洪名多少萬始堪一世見慈親出家難遇法難聞聞者當知佛德熏欲得不辜慈願力必從現世脫塵氛濁穢難堪是此中靈光一點被塵壅而今欲復心原舊必見彌陀始立功異域覉留久背親傷哉苦戀夢中身幸蒙教主傳音信始覺蓮生適待人又次妙能法師淨土感懷原韻十首執持名號善根多無始愆尤盡滅磨諸佛因斯常護念臨終定得見彌陀佛號但能念一聲無邊功德悉皆成故令虎逼開唇者七寶蓮中早早生欲願今生達寶池全憑深信不相違更能佛號持成片必得蓮開上上枝一將垢體認為常定造深殃苦日長諸佛誠言皆為此急須生厭慕西方諸教功成在一心豈容妄想暫時侵唯茲信願持名法多散亦能感聖臨秘藏指南云深信切願念佛而念佛時心多散亂者即是下品下生古德云品位雖低永居不退華中快樂猶勝天宮故北山詩云但得蓮中託化來從教多劫未華開華中快樂同忉利不比人間父母胎欲想淨功一世成時時切勿離洪名還須信願常堅固方得臨終向彼行釋迦滅度幾千年可嘆眾生被業纏幸有一條徑直路朝朝趨向必生蓮自性本清豈用除因生貪染必須祛故應發願持名號始可將來坐寶車罪業欲期及早清須將佛號誦分明當知淨土已生者箇箇皆從精進心障重應將念佛除倘無精進亦難祛曾聞惡逆稱名者全仗心強上寶車附妙能法師淨土偶成二十首方便無如淨土門一聲佛號攝三根縱然口誦心多亂念念猶能滅苦原彼佛偏憐惡世中金臺到處接凡庸吾今幸遇如斯教決不因循再戀東淨土法門妙莫窮圓收萬類入蓮宮火車相現持名號亦得橫超極樂中欲生安養寶蓮池禮像持名莫廢時日禮幾回持幾萬名標蕚上可先知廣學三乘總是權執持名號實單傳恒沙諸佛殷勤讚不可輕心看淺然世間萬事總成空唯此持名有勝功廣舌因斯齊徧覆古今賢聖盡歸崇閙中念佛勝居山境亂方知厭垢寰罪業少多俱弗論欣深定入藕華間願往西方是宿根多生曾受佛深恩一聲名號勤勤念定感彌陀親手援信願持名盡絕非圓融直捷易投機功高不用兼參觀徧閱他宗此法稀莫嫌記數是愚夫記數功程易可圖壽祖朝朝佛十萬位高名播冥王都深慚虗度數光陰淨業未成被染侵幸信樂方便大至稱十念亦堪臨從前懈怠每徘徊那覺無常信息來老病衰殘今已逼速持佛號託蓮胎惡逆十稱尚往生況能畢世誦洪名更加持戒行諸善他日定蒙彼佛迎聰明反被聰明誤不及愚人行實步持一洪名記一珠蓮華光色時時露靈根誰勝蘇東坡也喜終身供佛陀可惜如今誇解者不能念佛負恩多一聲佛號妙難思可惜聰明反不知昔有兇愚生改悔未完十句到蓮池染心熾盛道難純那得今生出苦輪誓誦洪名專記數必期臨死見慈親念佛妙宗豈易聞宿生培種始堪熏賴逢知識親提方得時時離垢氛百八輪珠在手中暫停便有垢塵壅欲使淨土華開早記數持名始見功朝朝哭訴老慈親只為難離熱惱身百苦煎熬時已久願求早作樂人又附妙能法師淨土感懷十首念佛莫嫌罪業多洪名力大定消磨從前未識如斯妙雜學餘門負佛陀每念彌陀帶哭聲為愁淨業不能成從今畢命為期限願歇狂心早往生十念亦堪達寶池況能盡報行無違彌陀大願原平等故得蓮分各一枝果知佛性本真常定信凡軀不久長必欲永離生死苦急持佛號往西方從前儱侗說唯心雖誦洪名怕妄侵一讀散心念佛頌何愁六賊盡來臨深慚念佛功無成都為攀緣逐利名幸遇恩師恒痛䇿誓從今世向西行覉絆塵緣數十年如蠶作繭自糾纏今朝再不多稱佛至死如何上寶蓮我心垢重實難除暫念洪名豈可祛必仗一生長遠力臨終堪上白牛車口誦洪名句句清手中珠數記分明但能如是終離苦何必更愁多妄心口誦洪名句句清運口業也手中珠數記分明運身業也直指或問曰如何用心得不散亂答能運身口之念母論其散但不間斷自能一心亦可即名一心唯行之不休為度固不必憂散亂矣故云但能如是終離苦何必更愁多妄心利名惡作不能除那得便將妄想祛自勸持名當著力免教墮在火輪車直指云今人因不遂志乃噫云我生平都罷了參禪非所望不如且念佛於是反怠其身曾未深省倘遇些些得志無量惡作依舊現前念佛如此何益之有彼謂參禪妙而難如造萬間大廈念佛粗且易如作一隙草窟見地若此饑遇王膳認為草茹如意珠王視為魚目可不哀哉故云自勸持名當着力免教墮在火輪車戀西大師念佛喝附慶領直捷彌陀要解云阿彌陀佛是萬德洪名以名召德罄無不盡徹悟禪師云一句所念之佛全德立名德外無名以名召德名外無德寄語持名行者當思此語始知持名不必參觀至簡易至直捷也余愧數年以來不解此旨隨伶俐人脚跟所轉妄謂彌陀名號曲為下根之人若上智念佛必要參究作觀方稱有禪有淨每懷此意究竟參又參不到觀又觀不成幸於辛未春而得解入彌陀三身之德但稱名而頓彰圓中鈔云一稱嘉號萬德齊彰果有此妙自此參觀心絕慶幸之至若非父母勤苦之力讀兩年書識幾個字那有今朝愧出家來並無酧薦遂然臂香四十八炷供養阿彌陀佛願我生身父母承此善根早生極樂因作偈云以名召德本融通彼佛分明在口中果得持名無異念聲聲露出紫金容手掐輪珠記佛名珠中有佛甚分明只因自己塵緣重終日於中不見形家貧已讀兩年書父母辛勤汗如雨今解以名召德宗全憑識字看經語臂上䖍焚六八香至心供養彌陀佛以斯功德願雙親早脫苦輪生樂國惜前謬濫堪悲昔日墮偏空妄謂已明向上宗念著彌陀平淡淡自稱見地喜濃濃初出家時本信西一欣禪理反嫌低至遭兵難方知謬盡改從前一切非淨宗未入自稱通濫解彌陀即主翁雖說洪名吾喜念心中猶著沒西東我學參禪只解空謬稱心淨即蓮宮至看十要明西有始決持名願捨東名號本願眾生垢重道難修苦海茫茫怎出頭法藏因斯立誓願但將名號度羣流彌陀名號願無邊普攝凡愚頓且圓惡逆回心纔十念火車化作紫金蓮持名自得洪名隱隱口中稱手掐輪珠靜靜聽聽得玄音明歷歷恍如有佛露真身開唇誦佛微微響攝耳澄心細細聽聽得佛音含淚出宛如難子哭慈親持名要䇿口誦佛耳聽聲句句應使勿暫停但得如斯無夾雜宛然有佛在其唇名一舉佛頓彰徹悟禪師云全德立名德外無名以名召德名外無德少康祖師功極於此故能稱一聲名出一尊佛聲聲全露自心光即徹悟云一聲佛號一聲心直下分明豈待尋鞭影不勞頻舉示白牛運出古黃金為茲不用雜參觀只要當人願力強堅密大師云六字洪名念念之間欣厭具足此即願力堅強之謂也持名重口持名重口義深深當究大乘圓頓經法華一稱皆作佛觀經十氣便超生洪名功大在音聲故得頓收惡逆根感應易成全仗此高賢慎勿看為輕持名當響我稱名號響如雷彼佛遙聞必速來只為念聲力小小故他緩緩送金臺我把彌陀盡力稱蓮池會裏必聞聲其中諒有舊親戚終肯早來送好音持名伏妄稱佛不宜記妄心最宜聽著口中音譬如白日濃雲起當幸陽光不被侵稱名伏妄有奇勳勳在口中出響聲譬若人間千怪起一雷能破眾邪心三業圓修口稱佛號必從心手掐輪珠正屬身三業圓修功必大故堪將此廣流行細想佛宣三藏經無非警誡修三業所以深勸稱彌陀聲聲圓淨易超越老實念佛老實念彌陀蓮歸路直暫時生巧心即刻墮邪域老實念彌陀易離生死苦一貪奇妙功難到清凉所老實念彌陀應須不輟口聲聲如哭親恰恰朝西走老實念彌陀數珠休脫手日持幾萬聲在此終非久刺血暢懷我今刺舌血敬寫彌陀經諸佛應生喜彌陀必更欣我今刺舌血塗徧六方佛諒必共哀憐令吾生樂國我刺左手血書成六八願彌陀欲普收必定有吾分我刺右手血流歸九品池不分華大小必有我一枝覆戀公書戀公恩師上人座下身心清泰功業精誠進修如願不卜可知瑩自師起七課程雖加少許奈警覺無人疑團數起何則雖遵師訓老實念佛如子哭親自恨猛念不堅至誠時少懈慢時多如用兵者猛將在前後無老成諳鍊之謀相繼恐不足以成功一疑也至開唇誦佛攝耳聽聲此法於瑩似有宿緣然疑近乎理持於事持不甚懇切恐其執理廢事二疑也合二者以兼修之奈顧彼失此念此忘彼以致念慮紛紜莫知趣向恐非往生正因三疑也蒙師示以要䇿始知子哭親披堅猛將也耳聽聲老成善謀也二者缺一不可也且證以少康稱名出佛之效靈峯不必參觀之旨直令羣疑頓破師真慈恩加被不啻甘露灌瑩光明照瑩矣今而後唯有死心持名以報師恩而已至刺血暢懷四偈皆從深信中流露暢所欲言且其中皆有必定二字此即預知之驗他日蓮生上品瑩當為師先慶也特字拜覆淨安不宣弟子照瑩和南百拜又覆戀公書夫欲橫超三界徑生安養者無他奇法唯在當人願力堅耳何也蓋願力不堅則塵緣難斷塵緣難斷故異念不息是以終日持名斷續無時總莫能得夫正定悠悠散善不過為作佛之種子豈是往生正因此學者貼肉臭鶻汗衫不可不早除脫也讀師慶領直捷持名自得數偈知師擺脫塵緣一念持名久無間斷矣不過悲心流露特現身說法為後學作痛䇿耳他如持名要䇿重口當響伏妄及三業圓修等偈力救時症法藥遍施真病夫知醫浪子憐客關歷語也至惜前謬濫名號本願諸作為執偏空者下頂門針使知痛而後投以清凉散師真剖心瀝血為法為人不惜苦口焦唇他日往生極樂亦必仗比洪勳而高躋勝蓮矣瑩何不幸而不及早遇師瑩獨何幸而今乃得遇師唯有畢生執隨以酧師德於萬一已耳特此敬呈戀公恩師上人座下慈覽即希指正弟子照瑩稽首百拜淨土隨學題詞每嘆娑婆無量苦死生輪迴沒定所纔得人身轉瞬間又隨惡報沉冥府何幸世尊悲願深特駕慈航救沉淪無問自說持名法欲使含靈盡出塵東土闡揚自遠祖社結廬山修淨土高士無數悉往生後裔諸賢踵其武傷哉正法值陵夷學侶紛紛喜鬬奇但念彌陀心顯現不肯承當反覓誰敲門瓦子打親娘可憐背騁趨羊腸好說唯心無他土如斯邪見更可傷幸師力將悲智運法藥遍施救時病一字一句總清凉令速超凡義無剩神珠具寶不可量亦猶帝網映千光根器奚容分高下隨分領納盡非常神珠即師所集之書極應時機以開圓解淨業學者當細玩之嗟我何緣值明師一言痛快愈盲癡瑩向喜持名愧無要指蒙師示以嬰兒墮水急呼母救之喻頓息馳求深霑法乳但願法寶常住世人人隨學霑恩施
