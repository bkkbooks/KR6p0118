front:
  text: 淨業痛策附刻序淨業痛䇿者乃涔陽空靈大師諱照瑩號歸西之所著也深深慶法大大讚恩且重重闡揚戀西大師耳提面命慈悲之德真可以自䇿䇿人欲速成淨業必賴於此其有功於淨土豈小小哉余附入淨土必求者是戀西大師之所親囑也因見痛䇿之書最應時機必大行世恐好學之人嫌其太略是故再瀝心血集成是書而佐助之其言詞懇切行願真深愧我愚癡無言可讚只堪跪向佛前敬然臂香四十八炷供養阿彌陀佛發願云我昔有何善今世得逢師聞此微妙語定可望蓮池是故然臂香供養彌陀佛願我盡未來常遵如是䇿此書亦名淨業痛䇿者誠可謂痛䇿中之大痛䇿也有染西道源淨友發心募刻以培淨因願見聞者起信願行盡此報身同生淨土云光緒三年孟夏月淨業學人心永稽首書於山陰之法源庵淨業痛策前附彌陀經禮想儀者乃戀西大師敬遵堅祖彌陀行儀之所述也收廣成略而經義愈顯血力神思妙哉至矣故令座下修者悉皆稱善以現前一念本具廣大之心而徧禮十方三世常住三寶託十方三世常住三寶而頓顯現前一念本具廣大之心所謂即自即他即理即事即真空妙有即因該果海果徹因源即十世古今始終不離於當念微塵剎海自他不隔於毫端也持一卷小小彌陀經便為十方三世一切諸佛之所護念蓋為此也故要解云華嚴奧藏法華秘髓一切諸佛之心要菩薩萬行之司南皆不出於此矣當知此儀即圓淨三業之要術也出聲口業淨也作禮身業淨也默想經文意業淨也再加長跪朗誦又是淨身口之極則也如是懇切至誠而修十方諸佛彌陀釋迦豈不決定速垂加護令臨命終時決定往生非但決定往生且得見佛必早欲速入娑婆普度含識亦必仗此者也如是功德十方諸佛出廣長舌常讚不休豈能盡哉願淨業後賢不可不盡力而共行之上皆戀公親口所宣余不過隨記而已時在光緒三年夏日後學心永稽首書於報恩關右佛說阿彌陀經禮想儀戀西釋子古崑遵古略輯行者凡禮想時先跪佛前燒香合掌云願此香煙雲徧滿十方界供養一切佛世間難信法及諸上善人普熏諸眾生皆發菩提心即起禮佛一心頂禮娑婆世界五濁惡世說難信法本師釋迦牟尼佛拜下默想經文一節云舍利弗如我今者稱讚諸佛不可思議功德下至是為甚難止一心頂禮十方世界出廣長舌勸讚西方恒河沙數諸佛舍利弗如我今者讚歎阿彌陀佛不可思議功德之利下至上方一切諸佛所護念經止一心頂禮西方極樂世界光壽無量普攝羣生阿彌陀佛舍利弗於汝意云何彼佛何故號阿彌陀下至於今十劫止一心頂禮西方極樂世界執持名號臨終導引阿彌陀佛舍利弗不可以少善根下至應當發願生彼國土止一心頂禮西方極樂世界己今當願皆令往生阿彌陀佛舍利弗若有人已發願下至生彼國土止一心頂禮稱讚不可思議功德一切諸佛所護念經及十方三世一切尊法舍利弗於汝意云何何故名為下至及諸佛所說止一心頂禮西方極樂世界觀音勢至諸上善人及清淨大海眾菩薩摩訶薩又舍利弗彼佛有無量無邊聲聞弟子下至俱會一處止一心頂禮西方極樂世界靈鳥樹下聞音正念諸菩薩摩訶薩復次舍利弗彼國常有種種奇妙雜色之鳥下至成就如是功德莊嚴止一心頂禮西方極樂世界黃金地上盛華供佛諸菩薩摩訶薩又舍利弗彼佛國土常作天樂下至功德莊嚴止一心頂禮西方極樂世界蓮華池內寶樓閣中諸菩薩摩訶薩又舍利弗極樂國土有七寶池下至功德莊嚴止一心頂禮西方極樂世界無有眾苦但受諸樂一切菩薩摩訶薩爾時佛告長老下至是故彼國名為極樂止一心頂禮文殊彌勒諸大菩薩舍利弗等諸大尊者及十方三世一切聖眾如是我聞下至無量諸天大眾俱止禮想已跪誦彌陀經一卷往生呪三遍讚云阿彌陀佛身金色相好光明無等倫白毫宛轉五須彌紺目澄清四大海光中化佛無數億化菩薩眾亦無邊四十八願度眾生九品咸令登彼岸南無西方極樂世界大慈大悲阿彌陀佛稱佛多少隨力而止南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩各十稱念畢回向發願云弟子稱念阿彌陀真實功德佛名號唯願慈悲垂攝受證知懺悔及所願我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我今所修諸善根一切皆悉盡回向普願法界諸眾生同生西方極樂國自歸依佛當願眾生體解大道發無上心自歸依法當願眾生深入經藏智慧如海自歸依僧當願眾生統理大眾一切無礙和南聖眾經云多有菩薩欲聞此經而不能得若有眾生聞此經者於無上道終不退轉是故應當專心信受持誦說行禮想儀者乃依經所出實要中之要切中之切每日欲禮幾時各隨其力但早晚二時決不可少臨睡回向簡便法則歡喜長者當依西歸行儀臨睡時佛前長跪合掌至心竭力念南無阿彌陀佛十口氣南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩各十聲發願云弟子某甲現是生死凡夫罪障深重輪迴六道苦不可言今遇知識得聞彌陀名號本願功德一心稱念求願往生願佛慈悲不捨哀憐攝受弟子某甲不識佛身相好光明願佛示現令我得見及見觀音勢至諸菩薩眾彼世界中清淨莊嚴光明妙相等令我了了得見禮佛三拜歸寮養息蓮宗正傳初祖廬山慧遠大師八月初六日徃生二祖光明善導大師未考彌陀誕日當供三祖般舟承遠大師七月十九日往生四祖五會法照大師十二月初一日徃生五祖臺巖少康大師十月初三日徃生六祖永明智覺大師二月廿六日徃生七祖昭慶省常大師正月十二日徃生八祖雲棲蓮池大師七月初二日往生九祖靈峯蕅益大師正月廿一日徃生十祖梵天思齊大師四月十四日徃生十一祖資福徹悟大師十二月十七日往生如上諸祖哀憐末世脫苦無由力宏此宗廣度羣品慈悲恩德豈可議哉我等今日信西方彌陀願力發心持名決志求生皆諸祖之恩德是故逢往生之日當䖍備齋供或敬然臂香一者自慶聞法持名愈切二者求其冥加往生愈速願諸淨友而共勉之丙子夏日後學古崑恭對諸祖各然臂香三炷稽首謹識淨業痛策緣起不肖照瑩業障深重善根微淺雖遇知識得信佛號是最勝法卻未得持名之要訣故每被妄想疑情之所搖動不能決志聞戀西大師極力主張淨土日誦彌陀數萬聲雖大熱大寒亦無小懈集有蓮宗必讀西方徑路淨土自警淨土神珠西歸行儀及經律異相念佛開心頌等書行世一時沾法乳者不少瑩深慚福薄未獲親承甲戌冬師掩關於紹之山陰法源庵遂往叩之親依輪下蒙師授以最切要法乃曰若能生決定信專持一句洪名只要如嬰兒墮水急呼母救聲聲不已不必參觀除妄自然感應道交淨業易就瑩欽聆玄音不勝感激如盲得眼慶愍雙流不揣固陋勉成八偈并偶成十咏及次妙能法師淨土詩原韻三十首共四十八稿恭呈關前荷師鴻慈細加改正謹錄一編以作終身痛䇿亦猶鈍馬著痛鞭而後行焉耳時光緒乙亥秋涔陽後學照瑩然臂香九炷稽首謹識
